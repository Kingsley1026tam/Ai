<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced 3D Game with Free Rotation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87ceeb;
            touch-action: none;
            user-select: none;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 100;
        }
        /* Custom Model Upload Button */
        #upload-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }
        #modelUpload {
            margin-top: 5px;
            color: white;
        }
        /* Mobile UI Elements */
        #mobile-ui { display: none; }
        .mobile-btn {
            background: rgba(255, 255, 255, 0.3); border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%; color: white; font-family: sans-serif; font-weight: bold;
            display: flex; align-items: center; justify-content: center; z-index: 10; position: absolute;
        }
        .mobile-btn:active { background: rgba(255, 255, 255, 0.6); }
        
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.2); border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5); touch-action: none; z-index: 10;
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px; width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.7); border-radius: 50%; pointer-events: none;
        }
        
        #jump-btn { bottom: 60px; right: 40px; width: 80px; height: 80px; }
        
        /* Mobile Zoom Buttons */
        #zoom-in-btn { top: 120px; right: 20px; width: 45px; height: 45px; font-size: 24px;}
        #zoom-out-btn { top: 180px; right: 20px; width: 45px; height: 45px; font-size: 24px;}

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
            display: none; pointer-events: none; z-index: 50;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="info">
        <strong>Controls:</strong><br>
        W,A,S,D - Move | Space - Jump<br>
        Hold Right-Click - Look around<br>
        Scroll Wheel or [-] / [=] keys - Zoom Camera<br>
        <em>Zoom all the way in for 1st Person</em>
    </div>

    <div id="upload-container">
        Load Character (.glb)<br>
        <input type="file" id="modelUpload" accept=".glb">
    </div>

    <div id="crosshair"></div>

    <div id="mobile-ui">
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="jump-btn" class="mobile-btn">JUMP</div>
        <div id="zoom-in-btn" class="mobile-btn">+</div>
        <div id="zoom-out-btn" class="mobile-btn">-</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // 1. SETUP SCENE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding; 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // 2. CREATE PLAYER GROUP
        const player = new THREE.Group();
        player.position.y = 0.5;
        scene.add(player);

        const defaultGeom = new THREE.BoxGeometry(1, 1, 1);
        const defaultMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const defaultBox = new THREE.Mesh(defaultGeom, defaultMat);
        player.add(defaultBox);

        // 3. MODEL LOADER LOGIC
        const gltfLoader = new THREE.GLTFLoader();
        document.getElementById('modelUpload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            gltfLoader.load(url, function(gltf) {
                while(player.children.length > 0){ player.remove(player.children[0]); }
                const model = gltf.scene;

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxAxis = Math.max(size.x, size.y, size.z);
                model.scale.multiplyScalar(1.0 / maxAxis);

                const newBox = new THREE.Box3().setFromObject(model);
                model.position.y -= newBox.min.y; 
                model.position.y -= 0.5; 
                
                // Keep model facing natural forward direction
                model.rotation.y = Math.PI; 
                player.add(model);
                URL.revokeObjectURL(url);
            });
        });

        // 4. WORLD GENERATION
        const gridHelper = new THREE.GridHelper(100, 100, 0x000000, 0xffffff);
        scene.add(gridHelper);
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x228b22 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        scene.add(ground);

        // 5. STATE VARIABLES
        let cameraMode = 3; 
        let yaw = 0; 
        let pitch = -0.2; 
        const sensitivity = 0.004;
        let isRightMouseDown = false;
        
        // --- ZOOM VARIABLES ---
        let targetZoom = 5; // Target distance of camera
        let actualZoom = 5; // Smoothly interpolates to targetZoom
        const maxZoom = 15;
        
        let inputX = 0; let inputY = 0;
        const keys = { w: false, a: false, s: false, d: false };

        const speed = 0.15;
        let velocityY = 0;
        const gravity = -0.015;
        const jumpStrength = 0.35;
        let isGrounded = true;

        // 6. DESKTOP INPUT HANDLING
        document.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
            if (e.code === 'Space' && isGrounded) { velocityY = jumpStrength; isGrounded = false; }
            
            // Zoom using keyboard
            if (e.key === '-' || e.key === '_') targetZoom += 1;
            if (e.key === '=' || e.key === '+') targetZoom -= 1;
            targetZoom = Math.max(0, Math.min(maxZoom, targetZoom));
        });
        document.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        document.addEventListener('mousedown', (e) => {
            if (e.button === 2) isRightMouseDown = true;
            if (cameraMode === 1 && e.target === renderer.domElement) document.body.requestPointerLock();
        });
        document.addEventListener('mouseup', (e) => {
            if (e.button === 2) isRightMouseDown = false;
        });

        document.addEventListener('mousemove', (e) => {
            const isPointerLocked = document.pointerLockElement === document.body;
            if (isPointerLocked || isRightMouseDown) {
                yaw -= e.movementX * sensitivity;
                pitch -= e.movementY * sensitivity;
                pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
            }
        });

        // Scroll to zoom smoothly
        document.addEventListener('wheel', (e) => {
            targetZoom += e.deltaY > 0 ? 1 : -1;
            targetZoom = Math.max(0, Math.min(maxZoom, targetZoom)); // Bound between 0 and maxZoom
        });

        // 7. MOBILE TOUCH HANDLING
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouchDevice) {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('info').style.display = 'none';
        }

        const activeTouches = {};
        let initialPinchDistance = null;
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickCenter = { x: 0, y: 0 };

        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'INPUT') return; 
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                activeTouches[t.identifier] = { type: 'camera', lastX: t.clientX, lastY: t.clientY };
                
                if (t.target.id === 'jump-btn') {
                    if (isGrounded) { velocityY = jumpStrength; isGrounded = false; }
                    activeTouches[t.identifier].type = 'ui';
                } else if (t.target.id === 'zoom-in-btn') {
                    targetZoom = Math.max(0, targetZoom - 2);
                    activeTouches[t.identifier].type = 'ui';
                } else if (t.target.id === 'zoom-out-btn') {
                    targetZoom = Math.min(maxZoom, targetZoom + 2);
                    activeTouches[t.identifier].type = 'ui';
                } else if (t.target.id === 'joystick-zone' || t.target.id === 'joystick-knob') {
                    activeTouches[t.identifier].type = 'joystick';
                    const rect = joystickZone.getBoundingClientRect();
                    joystickCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                    updateJoystick(t.clientX, t.clientY);
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if(e.target.tagName === 'INPUT') return;
            
            // Pinch to zoom
            if (e.touches.length === 2) {
                const distance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (initialPinchDistance === null) initialPinchDistance = distance;
                else {
                    const delta = distance - initialPinchDistance;
                    targetZoom -= delta * 0.05;
                    targetZoom = Math.max(0, Math.min(maxZoom, targetZoom));
                    initialPinchDistance = distance;
                }
            } else initialPinchDistance = null;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const td = activeTouches[t.identifier];
                if (!td) continue;
                if (td.type === 'joystick') updateJoystick(t.clientX, t.clientY);
                else if (td.type === 'camera' && e.touches.length < 2) {
                    yaw -= (t.clientX - td.lastX) * sensitivity * 1.5;
                    pitch -= (t.clientY - td.lastY) * sensitivity * 1.5;
                    pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
                    td.lastX = t.clientX; td.lastY = t.clientY;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (activeTouches[t.identifier] && activeTouches[t.identifier].type === 'joystick') {
                    inputX = 0; inputY = 0; joystickKnob.style.transform = `translate(0px, 0px)`;
                }
                delete activeTouches[t.identifier];
            }
            if (e.touches.length < 2) initialPinchDistance = null;
        });

        function updateJoystick(clientX, clientY) {
            const maxRadius = 40;
            let dx = clientX - joystickCenter.x, dy = clientY - joystickCenter.y;
            const dist = Math.hypot(dx, dy);
            if (dist > maxRadius) { dx = (dx/dist)*maxRadius; dy = (dy/dist)*maxRadius; }
            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            inputX = dx / maxRadius; inputY = dy / maxRadius;
        }

        // 8. MAIN GAME LOOP
        function animate() {
            requestAnimationFrame(animate);

            // --- MOVEMENT ---
            let moveForward = (keys.w ? 1 : 0) - (keys.s ? 1 : 0) - inputY;
            let moveRight = (keys.d ? 1 : 0) - (keys.a ? 1 : 0) + inputX;
            const length = Math.hypot(moveRight, moveForward);
            
            if (length > 0.05) { 
                // Normalize to prevent faster diagonal movement
                const normRight = moveRight / length; 
                const normForward = moveForward / length; 

                const forwardDirX = -Math.sin(yaw), forwardDirZ = -Math.cos(yaw);
                const rightDirX = Math.cos(yaw), rightDirZ = -Math.sin(yaw);

                player.position.x += (forwardDirX * normForward + rightDirX * normRight) * speed;
                player.position.z += (forwardDirZ * normForward + rightDirZ * normRight) * speed;
                
                // --- PLAYER ROTATION FIX ---
                // Calculate the exact angle the player is moving towards
                const targetAngle = yaw + Math.atan2(-normRight, normForward);
                
                // Create a quaternion (rotation data) for that angle
                const targetRotation = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), targetAngle);
                
                // Smoothly turn the player to face the target rotation
                player.quaternion.slerp(targetRotation, 0.15); 
            }

            // Gravity & Jumping
            if (!isGrounded) {
                velocityY += gravity;
                player.position.y += velocityY;
                if (player.position.y <= 0.5) { 
                    player.position.y = 0.5; velocityY = 0; isGrounded = true; 
                }
            }

            // --- CAMERA ZOOM AND SWITCH LOGIC ---
            // Smoothly ease the actual zoom towards the target zoom
            actualZoom += (targetZoom - actualZoom) * 0.1;

            if (actualZoom < 0.5) {
                cameraMode = 1; // Snap to 1st person
                document.getElementById('crosshair').style.display = 'block';
            } else {
                cameraMode = 3;
                document.getElementById('crosshair').style.display = 'none';
            }

            const lookDirX = -Math.sin(yaw) * Math.cos(pitch);
            const lookDirY = Math.sin(pitch);
            const lookDirZ = -Math.cos(yaw) * Math.cos(pitch);

            if (cameraMode === 1) {
                player.visible = false; 
                camera.position.set(player.position.x, player.position.y + 0.3, player.position.z);
                camera.lookAt(camera.position.x + lookDirX, camera.position.y + lookDirY, camera.position.z + lookDirZ);
            } else {
                player.visible = true;
                // Place camera behind player based on actualZoom distance
                camera.position.set(
                    player.position.x - lookDirX * actualZoom, 
                    player.position.y + 1 - lookDirY * actualZoom, 
                    player.position.z - lookDirZ * actualZoom
                );
                camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
