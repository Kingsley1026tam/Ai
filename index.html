<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Settings */
        #sidebar {
            width: 300px;
            background-color: #181825;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid #313244;
        }

        h2 {
            color: #cba6f7;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        label {
            font-size: 0.85rem;
            color: #a6adc8;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            background-color: #313244;
            border: 1px solid #45475a;
            border-radius: 6px;
            color: #cdd6f4;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #cba6f7;
        }

        /* Chat Window Container */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Chat Bubbles */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user {
            background-color: #cba6f7;
            color: #11111b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .assistant {
            background-color: #313244;
            color: #cdd6f4;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        /* Input Bar area */
        #input-container {
            padding: 20px;
            background-color: #181825;
            border-top: 1px solid #313244;
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            resize: none;
            height: 46px;
        }

        #send-btn {
            width: 100px;
            background-color: #cba6f7;
            color: #11111b;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background-color: #b4befe;
        }

        #send-btn:disabled {
            background-color: #585b70;
            color: #a6adc8;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>DeepSeek Settings</h2>
        <div>
            <label for="api-key">API Key:</label>
            <input type="password" id="api-key" placeholder="sk-...">
        </div>
        <div>
            <label for="model-select">Model:</label>
            <select id="model-select">
                <option value="deepseek-v4-flash">deepseek-v4-flash</option>
                <option value="deepseek-v4-pro">deepseek-v4-pro</option>
            </select>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-messages">
            <div class="message assistant">Hello! Please enter your DeepSeek API key in the sidebar to start chatting.</div>
        </div>
        
        <div id="input-container">
            <input type="text" id="user-input" placeholder="Type your message here..." disabled>
            <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('api-key');
        const modelSelect = document.getElementById('model-select');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatMessages = document.getElementById('chat-messages');

        // Keep track of total conversation history for AI context
        let conversationHistory = [
            { role: "system", content: "You are a helpful, clever AI assistant." }
        ];

        // Enable inputs only when an API key is entered
        apiKeyInput.addEventListener('input', () => {
            const hasKey = apiKeyInput.value.trim().length > 0;
            userInput.disabled = !hasKey;
            sendBtn.disabled = !hasKey;
        });

        // Allow pressing 'Enter' to send messages
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !userInput.disabled) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            const model = modelSelect.value;

            if (!text || !apiKey) return;

            // 1. Clear input field immediately
            userInput.value = '';

            // 2. Append User message to UI and history
            appendMessage(text, 'user');
            conversationHistory.push({ role: 'user', content: text });

            // 3. Create a placeholder bubble for the AI response
            const assistantBubble = appendMessage('', 'assistant');
            
            try {
                // 4. Call the DeepSeek API with streaming enabled
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: conversationHistory,
                        stream: true // Enables real-time word streaming
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} Status`);
                }

                // 5. Read the incoming network stream chunks
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let aiResponseText = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        const cleanedLine = line.trim();
                        if (!cleanedLine || cleanedLine === 'data: [DONE]') continue;

                        if (cleanedLine.startsWith('data: ')) {
                            try {
                                const parsed = JSON.parse(cleanedLine.replace('data: ', ''));
                                const content = parsed.choices[0].delta.content;
                                if (content) {
                                    aiResponseText += content;
                                    assistantBubble.textContent = aiResponseText;
                                    chatMessages.scrollTop = chatMessages.scrollHeight; // Auto scroll down
                                }
                            } catch (e) {
                                // Ignore partial or malformed stream lines
                            }
                        }
                    }
                }

                // 6. Push finalized AI response to history
                conversationHistory.push({ role: 'assistant', content: aiResponseText });

            } catch (error) {
                assistantBubble.textContent = `Error: ${error.message}. Please check your key and network connection.`;
                assistantBubble.style.color = '#f38ba8';
            }
        }

        function appendMessage(text, sender) {
            const bubble = document.createElement('div');
            bubble.classList.add('message', sender);
            bubble.textContent = text;
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return bubble;
        }
    </script>
</body>
</html>
