<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Math Engine AI</title>
    
    <script src="https://unpkg.com/mathjs@14.0.1/lib/browser/math.js" defer></script>

    <style>
        :root {
            --bg-main: #0f172a;
            --chat-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bubble-bot: #334155;
            --bubble-user: #3b82f6;
            --input-bg: #0f172a;
            --border-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background-color: var(--chat-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }

        .header {
            padding: 16px;
            background-color: #1e293b;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .engine-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-loading { background-color: #eab308; color: #000; }
        .status-online { background-color: #22c55e; color: #fff; }
        .status-fallback { background-color: #ef4444; color: #fff; }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .msg.bot {
            background-color: var(--bubble-bot);
            align-self: flex-start;
        }

        .msg.user {
            background-color: var(--bubble-user);
            align-self: flex-end;
        }

        .input-area {
            padding: 15px;
            background-color: #1e293b;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--bubble-user);
        }

        button {
            background-color: var(--bubble-user);
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
        }

        code {
            background: rgba(0,0,0,0.2);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            color: #f43f5e;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h3 style="margin-bottom: 2px;">Resilient Math AI</h3>
                <p style="font-size: 0.75rem; color: var(--text-muted);">Hybrid Offline Architecture</p>
            </div>
            <div id="statusBadge" class="engine-status status-loading">Connecting...</div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="msg bot">
                <strong>System Ready.</strong><br>
                If this is your first time loading the application, keep Wi-Fi connected for a few seconds to let the background scripts initialize. Afterwards, you can go completely offline!
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userIn" placeholder="Type an expression... (e.g., 2x + 10 = 30 or sqrt(144))" autocomplete="off">
            <button id="sendBtn">Run</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userIn = document.getElementById('userIn');
        const sendBtn = document.getElementById('sendBtn');
        const statusBadge = document.getElementById('statusBadge');

        // Check Engine Initialization Status
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (typeof math !== 'undefined') {
                    statusBadge.textContent = "Offline AI Loaded";
                    statusBadge.className = "engine-status status-online";
                } else {
                    statusBadge.textContent = "Local Core (No Wifi)";
                    statusBadge.className = "engine-status status-fallback";
                    appendLog("Notice: Advanced Engine CDN didn't resolve. Running native offline math matrix parser instead.", 'bot');
                }
            }, 1000);
        });

        sendBtn.addEventListener('click', executeMessage);
        userIn.addEventListener('keypress', (e) => { if (e.key === 'Enter') executeMessage(); });

        function executeMessage() {
            const query = userIn.value.trim();
            if (!query) return;

            appendLog(query, 'user');
            userIn.value = '';

            const reply = parseAndEvaluate(query);
            setTimeout(() => { appendLog(reply, 'bot'); }, 150);
        }

        function appendLog(text, sender) {
            const bubble = document.createElement('div');
            bubble.classList.add('msg', sender);
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(bubble);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function parseAndEvaluate(rawInput) {
            // Standardizing common verbal variations into mathematical symbols
            let clean = rawInput.toLowerCase()
                                .replace(/what is|calculate|solve for|find/g, '')
                                .replace(/plus/g, '+')
                                .replace(/minus/g, '-')
                                .replace(/times|multiplied by/g, '*')
                                .replace(/divided by/g, '/')
                                .trim();

            const isMathJSLive = (typeof math !== 'undefined');

            // --- STRATEGY A: LIGHTWEIGHT NATIVE RUNTIME (NO WIFI FALLBACK) ---
            if (!isMathJSLive) {
                try {
                    // Strips out any dangerous code injections, keeping arithmetic syntax safely intact
                    let safeExpression = clean.replace(/[^0-9+\-*/().\s^]/g, '').replace(/\^/g, '**');
                    if (!safeExpression) return "Input structure unreadable by local kernel. Connect once to internet to fetch comprehensive engine assets.";
                    
                    let mathCalculation = Function(`"use strict"; return (${safeExpression})`)();
                    return `[Local Base Core] Result:<br><strong>${mathCalculation}</strong>`;
                } catch (err) {
                    return "Syntax expression anomaly. Tip: Enter clear arithmetic statements like <code>(45 * 2) / 5</code>.";
                }
            }

            // --- STRATEGY B: ADVANCED EXTENDED ENGINE (POST-WIFI CACHED) ---
            try {
                // Algebraic Parsing Block
                if (clean.includes('=')) {
                    let segments = clean.split('=');
                    let left = segments[0].trim();
                    let right = segments[1].trim();

                    // Strip mathematical terminology functions out to correctly find standalone variables
                    let variableFilter = clean.replace(/sin|cos|tan|log|sqrt|pi|e/g, '');
                    let variableMatch = variableFilter.match(/[a-z]/);

                    if (!variableMatch) {
                        let equalityCheck = math.evaluate(`${left} == ${right}`);
                        return `Equation Condition: <strong>${equalityCheck}</strong>`;
                    }

                    let targetVariable = variableMatch[0];
                    let centralizedEquation = `(${left}) - (${right})`;
                    
                    // Automatically adds missing multiplication tokens (e.g. 5x converts to 5*x)
                    centralizedEquation = centralizedEquation.replace(/(\d)([a-z\(])/g, '$1*$2');

                    // Advanced matrix approach: evaluating linear points to trace interception roots
                    let contextZero = {}; contextZero[targetVariable] = 0;
                    let contextOne = {}; contextOne[targetVariable] = 1;

                    let evaluationZero = math.evaluate(centralizedEquation, contextZero);
                    let evaluationOne = math.evaluate(centralizedEquation, contextOne);

                    let rateOfChange = evaluationOne - evaluationZero;
                    if (rateOfChange === 0) return "The algebraic expression does not contain a linear independent variable result.";

                    let finalAlgebraicRoot = -evaluationZero / rateOfChange;
                    return `Algebra Root Extracted:<br><strong>${targetVariable} = ${finalAlgebraicRoot}</strong>`;
                } 
                
                // Pure Arithmetic Expression Evaluation
                else {
                    let structuredExpression = clean.replace(/(\d)([a-z\(])/g, '$1*$2');
                    let processingOutput = math.evaluate(structuredExpression);
                    return `Evaluated Processing Result:<br><strong>${processingOutput}</strong>`;
                }
            } catch (runtimeException) {
                return `Engine processing exception: ${runtimeException.message}. Please simplify your input terms.`;
            }
        }
    </script>
</body>
</html>
