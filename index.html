<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot with Google Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #app-container { width: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Login Section */
        #login-section { padding: 50px 20px; text-align: center; }
        
        /* Chat Section */
        #chat-section { display: none; display: flex; flex-direction: column; height: 500px; }
        #chat-header { background: #4285F4; color: white; padding: 15px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #logout-btn { background: white; color: #4285F4; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        #chat-log { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .message { padding: 10px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .user-msg { background: #e3f2fd; color: #0d47a1; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-msg { background: #f1f1f1; color: #333; align-self: flex-start; border-bottom-left-radius: 0; }
        
        /* Input Area */
        #input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; background: white; }
        #chat-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        #send-btn { background: #4285F4; color: white; border: none; padding: 10px 15px; margin-left: 10px; border-radius: 5px; cursor: pointer; }
        #send-btn:hover { background: #3367d6; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="login-section">
        <h2>Welcome to AI Chat</h2>
        <p>Please log in to continue</p>
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="chat-section" style="display: none;">
        <div id="chat-header">
            <span>AI Chatbot</span>
            <button id="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div id="chat-log"></div>
        <div id="input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    let chatHistory = [];
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const loginSection = document.getElementById('login-section');
    const chatSection = document.getElementById('chat-section');

    // --- Google Login Logic ---
    function handleCredentialResponse(response) {
        if (response.credential) {
            // Decode the JWT token to get user info (optional, for displaying name)
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            console.log("Logged in as: " + payload.name);
            
            // Switch UI
            loginSection.style.display = 'none';
            chatSection.style.display = 'flex';
            
            // Load saved chat history
            loadChatHistory();
        }
    }

    function logout() {
        loginSection.style.display = 'block';
        chatSection.style.display = 'none';
        chatLog.innerHTML = ''; // Clear chat view
    }

    // --- Chat & Storage Logic ---
    function loadChatHistory() {
        const savedChat = localStorage.getItem('aiChatHistory');
        if (savedChat) {
            chatHistory = JSON.parse(savedChat);
            chatLog.innerHTML = ''; // Clear existing
            chatHistory.forEach(msg => appendMessage(msg.text, msg.sender));
            scrollToBottom();
        }
    }

    function saveChatHistory() {
        localStorage.setItem('aiChatHistory', JSON.stringify(chatHistory));
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'ai-msg');
        msgDiv.textContent = text;
        chatLog.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        // 1. Display and save user message
        appendMessage(text, 'user');
        chatHistory.push({ text: text, sender: 'user' });
        chatInput.value = '';
        saveChatHistory();

        // 2. Fetch AI Response (Placeholder)
        const aiResponse = await getAIResponse(text);

        // 3. Display and save AI message
        appendMessage(aiResponse, 'ai');
        chatHistory.push({ text: aiResponse, sender: 'ai' });
        saveChatHistory();
    }

    // --- AI API Integration ---
    async function getAIResponse(userText) {
        // NOTE: Replace this mock function with an actual fetch request to your AI API.
        // Example for standard REST APIs:
        /*
        try {
            const response = await fetch('YOUR_API_ENDPOINT', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer YOUR_API_KEY'
                },
                body: JSON.stringify({ prompt: userText })
            });
            const data = await response.json();
            return data.reply; // Adjust based on your API's response structure
        } catch (error) {
            console.error("Error fetching AI:", error);
            return "Sorry, I couldn't connect to the AI server.";
        }
        */

        // Simulated delay for demonstration purposes
        return new Promise(resolve => {
            setTimeout(() => {
                resolve("I am a simple mock AI. You said: " + userText);
            }, 1000);
        });
    }
</script>

</body>
</html>
